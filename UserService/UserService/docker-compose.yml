version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: microservices
    ports:
      - "3308:3307"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: springboot_app
    depends_on:
      - mysql
    ports:
      - "9090:8080"

volumes:
  mysql_data: